<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPL Player Statistics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C12;
    --surface: #0E1520;
    --card: #131C2B;
    --card2: #1A2438;
    --border: #1E2D45;
    --red: #E8354A;
    --red-glow: rgba(232,53,74,0.15);
    --gold: #F5A623;
    --gold-dim: rgba(245,166,35,0.12);
    --teal: #00D9B1;
    --teal-dim: rgba(0,217,177,0.1);
    --blue: #4A9EFF;
    --blue-dim: rgba(74,158,255,0.1);
    --text: #E8EDF5;
    --text-dim: #7A8BA0;
    --text-muted: #3D5068;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND NOISE ── */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:0.4;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(8,12,18,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; align-items: center; gap: 24px;
    height: 64px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--red);
    text-shadow: 0 0 30px rgba(232,53,74,0.5);
    white-space: nowrap;
  }
  .logo span { color: var(--gold); }
  .header-divider { width:1px; height:32px; background: var(--border); }
  .header-sub { font-size:12px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }

  /* ── SEARCH AREA ── */
  .search-wrap {
    position: relative; z-index:1;
    padding: 48px 32px 0;
    max-width: 900px; margin: 0 auto;
  }
  .search-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .search-label span { color: var(--red); }
  .search-sub {
    color: var(--text-dim); font-size:14px; margin-bottom:24px;
  }
  .search-box-wrap {
    position: relative;
  }
  .search-icon {
    position:absolute; left:18px; top:50%; transform:translateY(-50%);
    color: var(--text-dim); font-size:18px; pointer-events:none;
  }
  #searchInput {
    width:100%; padding:16px 18px 16px 52px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 17px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow), 0 8px 32px rgba(0,0,0,0.4);
  }
  #searchInput::placeholder { color: var(--text-muted); }

  /* ── AUTOCOMPLETE ── */
  #autocomplete {
    position:absolute; top:calc(100% + 8px); left:0; right:0;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    max-height: 300px; overflow-y:auto;
    z-index: 200;
    display:none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  #autocomplete.show { display:block; }
  .ac-item {
    padding: 12px 18px;
    cursor:pointer;
    display:flex; align-items:center; gap:12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .ac-item:last-child { border-bottom:none; }
  .ac-item:hover, .ac-item.active { background: var(--card2); }
  .ac-name { font-size:15px; font-weight:500; }
  .ac-name mark { background:none; color:var(--red); font-weight:700; }
  .ac-team { font-size:12px; color:var(--text-dim); margin-left:auto; }
  .ac-badge {
    width:28px; height:28px; border-radius:50%;
    background: var(--red-glow);
    border: 1px solid var(--red);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:var(--red);
    flex-shrink:0;
  }

  /* ── EMPTY STATE ── */
  #emptyState {
    text-align:center; padding: 80px 32px;
    color: var(--text-muted);
    position: relative; z-index:1;
  }
  .empty-cricket { font-size:80px; margin-bottom:16px; opacity:0.3; }
  .empty-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--text-dim); letter-spacing:2px; margin-bottom:8px; }
  .empty-sub { font-size:14px; }

  /* ── PLAYER CARD ── */
  #playerCard {
    position:relative; z-index:1;
    max-width: 1100px; margin: 0 auto;
    padding: 32px 32px 80px;
    display:none;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to { opacity:1; transform:translateY(0); }
  }
  #playerCard.show { display:block; }

  /* ── PLAYER HERO ── */
  .player-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 32px;
    position: relative; overflow:hidden;
  }
  .player-hero::before {
    content:'';
    position:absolute; right:-60px; top:-60px;
    width:300px; height:300px;
    background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
    pointer-events:none;
  }
  .player-avatar {
    width: 88px; height:88px; border-radius:50%;
    background: linear-gradient(135deg, var(--red), #8B0020);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue',sans-serif;
    font-size: 36px; color:white;
    flex-shrink:0;
    border: 3px solid rgba(232,53,74,0.4);
    box-shadow: 0 0 30px rgba(232,53,74,0.3);
  }
  .player-info { flex:1; }
  .player-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 2px;
    line-height:1; margin-bottom:8px;
  }
  .player-team {
    font-size:13px; color:var(--text-dim);
    letter-spacing:2px; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .team-dot {
    width:8px; height:8px; border-radius:50%;
    background: var(--red);
  }
  .hero-stats {
    display:flex; gap:24px; margin-top:20px;
  }
  .hero-stat {
    display:flex; flex-direction:column; gap:2px;
  }
  .hero-stat-val {
    font-family:var(--mono); font-size:22px; font-weight:700;
    color: var(--gold);
  }
  .hero-stat-lbl {
    font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase;
  }
  .potm-badge {
    padding: 8px 16px;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    border-radius: 50px;
    font-size:13px; font-weight:600; color:var(--gold);
    display:flex; align-items:center; gap:6px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:20px; letter-spacing:3px;
    color:var(--text-dim); margin-bottom:16px;
    display:flex; align-items:center; gap:12px;
  }
  .section-title::after {
    content:''; flex:1; height:1px;
    background: linear-gradient(to right, var(--border), transparent);
  }
  .section-accent { color:var(--red); }

  /* ── STATS GRID ── */
  .stats-section { margin-bottom:28px; }
  .stat-grid {
    display:grid; gap:12px;
  }
  .stat-grid-4 { grid-template-columns: repeat(4, 1fr); }
  .stat-grid-3 { grid-template-columns: repeat(3, 1fr); }
  .stat-grid-6 { grid-template-columns: repeat(6, 1fr); }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position:relative; overflow:hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--border); transform:translateY(-1px); }
  .stat-card.highlight { border-color: var(--gold); background: var(--gold-dim); }
  .stat-card.highlight-teal { border-color: var(--teal); background: var(--teal-dim); }
  .stat-card.highlight-blue { border-color: var(--blue); background: var(--blue-dim); }
  .stat-card-lbl {
    font-size:11px; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:1.5px; margin-bottom:8px;
  }
  .stat-card-val {
    font-family:var(--mono); font-size:28px; font-weight:700;
    color: var(--text); line-height:1;
  }
  .stat-card.highlight .stat-card-val { color: var(--gold); }
  .stat-card.highlight-teal .stat-card-val { color: var(--teal); }
  .stat-card.highlight-blue .stat-card-val { color: var(--blue); }
  .stat-card-sub { font-size:11px; color:var(--text-muted); margin-top:4px; }

  /* ── PHASE BAR CHART ── */
  .phase-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  .phase-card {
    background: var(--card); border:1px solid var(--border);
    border-radius:14px; padding:20px;
  }
  .phase-name {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:12px;
  }
  .phase-runs {
    font-family:var(--mono); font-size:26px; font-weight:700; color:var(--text);
  }
  .phase-meta { display:flex; gap:16px; margin-top:8px; }
  .phase-meta span { font-size:12px; color:var(--text-dim); }
  .phase-meta strong { color:var(--text); font-family:var(--mono); }
  .phase-bar-wrap { margin-top:12px; height:4px; background:var(--border); border-radius:2px; }
  .phase-bar { height:4px; border-radius:2px; transition:width 0.6s ease; }

  /* ── SEASON COMPARISON ── */
  .season-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .season-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:20px;
  }
  .season-year {
    font-family:'Bebas Neue',sans-serif; font-size:32px;
    letter-spacing:2px; margin-bottom:12px;
  }
  .s24 { color:var(--gold); }
  .s25 { color:var(--teal); }
  .season-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid var(--border);
    font-size:13px;
  }
  .season-row:last-child { border-bottom:none; }
  .season-row-lbl { color:var(--text-dim); }
  .season-row-val { font-family:var(--mono); font-weight:600; color:var(--text); }

  /* ── INNINGS TABLE ── */
  .innings-table {
    width:100%; border-collapse:collapse;
  }
  .innings-table th {
    padding:10px 14px; text-align:left;
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-dim); background:var(--card2);
    border-bottom:1px solid var(--border);
  }
  .innings-table th:not(:first-child) { text-align:right; }
  .innings-table td {
    padding:10px 14px; font-size:13px;
    border-bottom:1px solid var(--border);
  }
  .innings-table td:not(:first-child) { text-align:right; font-family:var(--mono); }
  .innings-table tr:last-child td { border-bottom:none; }
  .innings-table tr:hover td { background:var(--card2); }
  .score-chip {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:36px; padding:2px 8px;
    border-radius:6px; font-family:var(--mono); font-weight:700;
    font-size:14px;
  }
  .score-high { background:var(--gold-dim); color:var(--gold); border:1px solid var(--gold); }
  .score-mid { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal); }
  .score-low { background:var(--card2); color:var(--text); }
  .score-duck { background:rgba(232,53,74,0.1); color:var(--red); border:1px solid var(--red); }

  /* ── TABLE WRAP ── */
  .table-wrap {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; overflow:hidden;
  }

  /* ── NO DATA ── */
  .no-data {
    padding:32px; text-align:center;
    color:var(--text-muted); font-size:14px;
  }

  /* ── RESPONSIVE ── */
  @media(max-width:768px) {
    .stat-grid-4 { grid-template-columns:repeat(2,1fr); }
    .stat-grid-6 { grid-template-columns:repeat(3,1fr); }
    .phase-grid { grid-template-columns:1fr; }
    .season-grid { grid-template-columns:1fr; }
    .hero-stats { flex-wrap:wrap; gap:12px; }
    .player-hero { flex-direction:column; text-align:center; }
    .player-team { justify-content:center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">NPL <span>STATS</span></div>
  <div class="header-divider"></div>
  <div class="header-sub">Nepal Premier League · Player Intelligence · 2024 & 2025</div>
</header>

<div class="search-wrap">
  <div class="search-label">PLAYER <span>STATS</span></div>
  <div class="search-sub">Search any of the 190 players from NPL 2024 & 2025</div>
  <div class="search-box-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Type a player name... e.g. Rohit Paudel" autocomplete="off">
    <div id="autocomplete"></div>
  </div>
</div>

<div id="emptyState">
  <div class="empty-cricket">🏏</div>
  <div class="empty-title">Search a Player</div>
  <div class="empty-sub">Enter any player name to see their full NPL statistics</div>
</div>

<div id="playerCard">
  <!-- dynamically rendered -->
</div>

const playerNames = Object.keys(DATA).sort();
const searchInput = document.getElementById('searchInput');
const autocompleteEl = document.getElementById('autocomplete');
const playerCard = document.getElementById('playerCard');
const emptyState = document.getElementById('emptyState');

let acIndex = -1;

function getInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function teamColor(team) {
  const map = {
    'Sudurpaschim Royals': '#F5A623',
    'Kathmandu Gorkhas': '#4A9EFF',
    'Janakpur Bolts': '#E8354A',
    'Lumbini Lions': '#00D9B1',
    'Biratnagar Kings': '#9B59B6',
    'Karnali Yaks': '#E67E22',
    'Chitwan Rhinos': '#27AE60',
    'Pokhara Avengers': '#E91E8C',
  };
  return map[team] || '#7A8BA0';
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function showAutocomplete(query) {
  if (!query || query.length < 1) { autocompleteEl.classList.remove('show'); return; }
  const q = query.toLowerCase();
  const matches = playerNames.filter(n => n.toLowerCase().includes(q)).slice(0,10);
  if (!matches.length) { autocompleteEl.classList.remove('show'); return; }
  acIndex = -1;
  autocompleteEl.innerHTML = matches.map((name, i) => {
    const p = DATA[name];
    return `<div class="ac-item" data-name="${name}" data-idx="${i}">
      <div class="ac-badge">${getInitials(name)}</div>
      <span class="ac-name">${highlight(name, query)}</span>
      <span class="ac-team">${p.team}</span>
    </div>`;
  }).join('');
  autocompleteEl.classList.add('show');
  autocompleteEl.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('click', () => selectPlayer(el.dataset.name));
  });
}

function selectPlayer(name) {
  searchInput.value = name;
  autocompleteEl.classList.remove('show');
  renderPlayer(name);
}

searchInput.addEventListener('input', e => showAutocomplete(e.target.value));
searchInput.addEventListener('keydown', e => {
  const items = autocompleteEl.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { acIndex = Math.min(acIndex+1, items.length-1); }
  else if (e.key === 'ArrowUp') { acIndex = Math.max(acIndex-1, -1); }
  else if (e.key === 'Enter') {
    if (acIndex >= 0 && items[acIndex]) selectPlayer(items[acIndex].dataset.name);
    else if (items.length === 1) selectPlayer(items[0].dataset.name);
    return;
  } else return;
  items.forEach((el,i) => el.classList.toggle('active', i===acIndex));
  if (items[acIndex]) items[acIndex].scrollIntoView({block:'nearest'});
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box-wrap')) autocompleteEl.classList.remove('show');
});

function fmt(val, decimals=1) {
  if (val === 0) return '0';
  if (val === 999 || val === 999.0) return '—';
  if (typeof val === 'number') return Number.isInteger(val) ? val.toString() : val.toFixed(decimals);
  return val || '—';
}

function scoreClass(s) {
  if (s === 0) return 'score-duck';
  if (s >= 50) return 'score-high';
  if (s >= 20) return 'score-mid';
  return 'score-low';
}

function phaseBar(val, max, color) {
  const pct = max > 0 ? Math.min((val/max)*100, 100) : 0;
  return `<div class="phase-bar-wrap"><div class="phase-bar" style="width:${pct}%;background:${color}"></div></div>`;
}

      </div>
    </div>

    <!-- PHASE BOWLING -->
    <div class="stats-section">
      <div class="section-title"><span class="section-accent">●</span> BOWLING BY PHASE</div>
      <div class="phase-grid">
        ${['Powerplay','Middle','Death'].map((ph,i) => {
          const colors = ['#4A9EFF','#F5A623','#E8354A'];
          const pd = bw.phase[ph] || {runs:0,balls:0,wickets:0,eco:0};
          return `<div class="phase-card">
            <div class="phase-name">${ph}</div>
            <div class="phase-runs" style="color:${colors[i]}">${pd.wickets}W</div>
            <div class="phase-meta">
              <span><strong>${pd.balls}</strong> balls</span>
              <span>Eco <strong style="color:${colors[i]}">${fmt(pd.eco)}</strong></span>
              <span><strong>${pd.runs}</strong> runs</span>
            </div>
            ${phaseBar(pd.wickets, bowlPhaseMax, colors[i])}
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- SEASON BOWLING -->
    <div class="stats-section">
      <div class="section-title"><span class="section-accent">●</span> BOWLING BY SEASON</div>
      <div class="season-grid">
        ${[2024,2025].map(s => {
          const sd = bw.season[s] || {};
          const cls = s===2024 ? 's24' : 's25';
          return `<div class="season-card">
            <div class="season-year ${cls}">${s}</div>
            <div class="season-row"><span class="season-row-lbl">Overs</span><span class="season-row-val">${sd.overs||'0.0'}</span></div>
            <div class="season-row"><span class="season-row-lbl">Wickets</span><span class="season-row-val">${sd.wickets||0}</span></div>
            <div class="season-row"><span class="season-row-lbl">Runs</span><span class="season-row-val">${sd.runs||0}</span></div>
            <div class="season-row"><span class="season-row-lbl">Economy</span><span class="season-row-val">${fmt(sd.eco||0)}</span></div>
            <div class="season-row"><span class="season-row-lbl">Average</span><span class="season-row-val">${sd.avg&&sd.avg>0&&sd.avg<999 ? fmt(sd.avg) : '—'}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : ''}

    <!-- FIELDING -->
    <div class="stats-section">
      <div class="section-title"><span class="section-accent">●</span> FIELDING STATISTICS</div>
      <div class="stat-grid stat-grid-4">
        <div class="stat-card highlight-blue">
          <div class="stat-card-lbl">Total Dismissals</div>
          <div class="stat-card-val">${f.total}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-lbl">Catches</div>
          <div class="stat-card-val" style="font-size:22px">${f.catches}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-lbl">Run Outs</div>
          <div class="stat-card-val" style="font-size:22px">${f.run_outs}</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-lbl">Stumpings</div>
          <div class="stat-card-val" style="font-size:22px">${f.stumpings}</div>
        </div>
      </div>
    </div>

    ${!hasBat && !hasBowl ? `<div class="no-data" style="padding:60px;font-size:16px">No detailed stats available for this player.</div>` : ''}
  `;
  window.scrollTo({top:0, behavior:'smooth'});
}

// Auto-search if URL param
const urlP = new URLSearchParams(location.search).get('player');
if (urlP && DATA[urlP]) { searchInput.value = urlP; renderPlayer(urlP); }
</script>
</body>
</html>
